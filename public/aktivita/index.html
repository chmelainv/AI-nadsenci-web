<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktivita</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-white min-h-screen">

  <div class="max-w-lg mx-auto px-5 py-10">
    <a href="/" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-8 transition-colors">
      ← Zpět na web
    </a>

    <div id="loading" class="text-center py-24 text-gray-400 text-sm">Načítám...</div>

    <div id="content" class="hidden"></div>

    <div id="error" class="hidden text-center py-24">
      <p class="text-gray-400 text-sm">Aktivita momentálně není k dispozici.</p>
    </div>
  </div>

  <script>
    async function init() {
      try {
        const res = await fetch('/content/activity.json?t=' + Date.now());
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        if (!data.title && !data.description) throw new Error('empty');
        render(data);
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      }
    }

    function render(data) {
      document.title = data.title || 'Aktivita — Fajne prompty';

      let html = '';

      if (data.photo) {
        html += `<img src="${esc(data.photo)}" alt="${esc(data.title || '')}"
          class="w-full rounded-2xl object-cover shadow-md mb-8" style="max-height:360px;">`;
      }

      if (data.title) {
        html += `<h1 class="text-3xl font-black text-gray-900 mb-3 leading-tight">${esc(data.title)}</h1>`;
      }

      if (data.description) {
        html += `<p class="text-gray-600 text-lg leading-relaxed mb-8">${esc(data.description)}</p>`;
      }

      if (data.url) {
        html += `
          <a href="${esc(data.url)}" target="_blank" rel="noopener"
            class="flex items-center justify-center gap-2 w-full py-4 px-8 bg-blue-700 text-white rounded-2xl font-bold text-lg hover:bg-blue-800 active:scale-95 transition-all shadow-lg">
            ${esc(data.btnLabel || 'Otevřít')}
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
          </a>`;
      }

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').innerHTML = html;
      document.getElementById('content').classList.remove('hidden');
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
