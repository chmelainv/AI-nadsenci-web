<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktivity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .desc-short { display: block; }
    .desc-full  { display: none; }
    .expanded .desc-short { display: none; }
    .expanded .desc-full  { display: block; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-5 py-4 text-center">
    <p class="text-xs text-gray-400 uppercase tracking-widest font-medium mb-1">Fajne prompty</p>
    <h1 id="page-title" class="text-2xl font-black text-gray-900">Aktivity</h1>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <div id="loading" class="text-center py-20 text-gray-400 text-sm">Načítám…</div>
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 gap-5" style="display:none;"></div>
    <div id="error" class="hidden text-center py-20 text-gray-400 text-sm">
      Žádné aktivity nejsou k dispozici.
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const eventId = params.get('event');

    async function init() {
      if (!eventId) { showError(); return; }

      try {
        const res = await fetch(`/content/events/${eventId}/activities.json?t=` + Date.now());
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (!data.activities || !data.activities.length) throw new Error();

        if (data.title) document.getElementById('page-title').textContent = data.title;
        document.title = data.title || 'Aktivity';

        renderGrid(data.activities);
      } catch (e) {
        showError();
      }
    }

    function renderGrid(activities) {
      const grid = document.getElementById('grid');
      grid.innerHTML = activities.map(a => card(a)).join('');
      document.getElementById('loading').classList.add('hidden');
      grid.style.display = 'grid';
    }

    function card(a) {
      const short = a.description.length > 80
        ? a.description.slice(0, 80).trimEnd() + '…'
        : a.description;
      const hasMore = a.description.length > 80;

      return `
        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden flex flex-col">
          ${a.photo
            ? `<img src="${esc(a.photo)}" alt="${esc(a.title)}"
                class="w-full object-cover" style="height:180px;">`
            : `<div class="bg-gray-100 flex items-center justify-center" style="height:100px;">
                <span class="text-gray-300 text-3xl">📷</span>
               </div>`
          }
          <div class="p-4 flex flex-col flex-1">
            <h2 class="font-bold text-gray-900 text-base mb-2 leading-snug">${esc(a.title)}</h2>

            <div class="card-desc text-gray-600 text-sm leading-relaxed mb-3 flex-1" data-full="${esc(a.description)}">
              <span class="desc-short">${esc(short)}</span>
              <span class="desc-full">${esc(a.description)}</span>
              ${hasMore ? `
                <button onclick="toggleDesc(this.closest('.card-desc'))"
                  class="block text-blue-600 text-xs mt-1 hover:underline font-medium toggle-btn">
                  Zobrazit více
                </button>` : ''}
            </div>

            ${a.url ? `
              <a href="${esc(a.url)}" target="_blank" rel="noopener"
                class="flex items-center justify-center gap-1.5 w-full py-2.5 px-4 bg-blue-700 text-white rounded-xl font-semibold text-sm hover:bg-blue-800 active:scale-95 transition-all mt-auto">
                ${esc(a.btnLabel || 'Otevřít')}
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                </svg>
              </a>` : ''}
          </div>
        </div>`;
    }

    function toggleDesc(el) {
      const expanded = el.classList.toggle('expanded');
      el.querySelector('.toggle-btn').textContent = expanded ? 'Zobrazit méně' : 'Zobrazit více';
    }

    function showError() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
